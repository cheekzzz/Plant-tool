<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Recommender</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7f6;
      padding: 20px;
      color: #1f2937;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #16a34a;
      color: white;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- RESULT SECTION -->
    <div class="card">
      <h2>Your Plant Recommendation 🌱</h2>

      <p id="resultText">Complete the quiz to get your plant.</p>
      <button onclick="generateResult()">Generate Sample Result</button>
    </div>

    <!-- EMAIL CAPTURE -->
    <div class="card">
      <h2>Save Your Plant Plan 🌿</h2>
      <p>Get your personalized plant care guide on email</p>

      <form 
        id="emailForm"
        action="https://earthlyours.us13.list-manage.com/subscribe/post?u=a044a68c308987aaf0eaa7e52&id=6904a60fbf&f_id=00c14be1f0"
        method="POST"
        target="_blank"
      >

        <!-- EMAIL -->
        <input 
          type="email" 
          id="emailInput"
          name="EMAIL" 
          placeholder="Enter your email" 
          required 
        >

        <!-- MAILCHIMP FIELDS -->
        <input type="hidden" name="FNAME" id="plantField">
        <input type="hidden" name="PLANT" id="plantNameField">
        <input type="hidden" name="SCORE" id="scoreField">
        <input type="hidden" name="LOCATION" id="locationField">

        <!-- TAG -->
        <input type="hidden" name="tags" value="663483">

        <!-- ANTI BOT -->
        <input 
          type="text" 
          name="b_a044a68c308987aaf0eaa7e52_6904a60fbf"
          tabindex="-1"
          value=""
          style="position:absolute; left:-5000px;"
        >

        <button type="submit">Send My Plant Plan</button>

      </form>

      <p id="emailStatus" class="status"></p>
    </div>

  </div>

  <script>
    // SAMPLE DATA (simulate your tool)
    let lastTopPlants = [];
    let lastAnswers = { location: "indoor" };

    function generateResult() {
      lastTopPlants = [{
        name: "Money Plant",
        confidence: 85
      }];

      document.getElementById("resultText").innerText =
        "Best Plant: Money Plant 🌿 (Confidence: 85%)";
    }

    function populateUserData() {
      const bestPlant = lastTopPlants[0];

      if (!bestPlant) return;

      document.getElementById("plantField").value = bestPlant.name;
      document.getElementById("plantNameField").value = bestPlant.name;
      document.getElementById("scoreField").value = bestPlant.confidence;
      document.getElementById("locationField").value = lastAnswers.location;
    }

    const emailForm = document.getElementById("emailForm");

    emailForm.addEventListener("submit", function(event) {

      if (!lastTopPlants.length) {
        event.preventDefault();
        document.getElementById("emailStatus").innerText =
          "Generate your plant recommendation first";
        return;
      }

      populateUserData();

      document.getElementById("emailStatus").innerText =
        "Sending your plant plan...";
    });
  </script>

</body>
</html>
